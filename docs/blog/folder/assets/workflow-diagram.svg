<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Publishing Workflow Diagram</title>
  <desc id="desc">A simple diagram showing a post writing workflow from markdown to deployment.</desc>
  <rect width="1200" height="520" fill="#f8fafc"/>
  <rect x="60" y="160" width="230" height="120" rx="22" fill="#111827"/>
  <text x="110" y="218" font-size="28" font-family="SF Pro Text, Helvetica, Arial, sans-serif" fill="#ffffff" font-weight="700">Write</text>
  <text x="110" y="255" font-size="22" font-family="SF Pro Text, Helvetica, Arial, sans-serif" fill="#d1d5db">index.md</text>

  <rect x="350" y="160" width="230" height="120" rx="22" fill="#2563eb"/>
  <text x="395" y="218" font-size="28" font-family="SF Pro Text, Helvetica, Arial, sans-serif" fill="#ffffff" font-weight="700">Preview</text>
  <text x="395" y="255" font-size="22" font-family="SF Pro Text, Helvetica, Arial, sans-serif" fill="#dbeafe">hugo server</text>

  <rect x="640" y="160" width="230" height="120" rx="22" fill="#059669"/>
  <text x="688" y="218" font-size="28" font-family="SF Pro Text, Helvetica, Arial, sans-serif" fill="#ffffff" font-weight="700">Build</text>
  <text x="688" y="255" font-size="22" font-family="SF Pro Text, Helvetica, Arial, sans-serif" fill="#d1fae5">docs/ output</text>

  <rect x="930" y="160" width="210" height="120" rx="22" fill="#7c3aed"/>
  <text x="968" y="218" font-size="28" font-family="SF Pro Text, Helvetica, Arial, sans-serif" fill="#ffffff" font-weight="700">Publish</text>
  <text x="968" y="255" font-size="22" font-family="SF Pro Text, Helvetica, Arial, sans-serif" fill="#ede9fe">GitHub Pages</text>

  <path d="M290 220H350" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
  <path d="M580 220H640" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
  <path d="M870 220H930" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>

  <polygon points="338,208 358,220 338,232" fill="#94a3b8"/>
  <polygon points="628,208 648,220 628,232" fill="#94a3b8"/>
  <polygon points="918,208 938,220 918,232" fill="#94a3b8"/>
</svg>
