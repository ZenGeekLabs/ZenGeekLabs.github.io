</a><script>
  (function () {
    const modes = ["auto", "light", "dark"];
    const labels = {
      auto: { short: "A", full: "当前主题：自动" },
      light: { short: "L", full: "当前主题：浅色" },
      dark: { short: "D", full: "当前主题：深色" }
    };

    function readMode() {
      const saved = localStorage.getItem("pref-theme");
      return modes.includes(saved) ? saved : "auto";
    }

    function resolveTheme(mode) {
      if (mode === "light" || mode === "dark") return mode;
      return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }

    function syncToggle(mode) {
      const button = document.getElementById("theme-toggle");
      if (!button) return;
      button.title = labels[mode].full;
      button.setAttribute("aria-label", labels[mode].full);
    }

    function applyMode(mode) {
      document.documentElement.dataset.theme = resolveTheme(mode);
      localStorage.setItem("pref-theme", mode);
      syncToggle(mode);
    }

    function cycleMode() {
      const current = readMode();
      const next = modes[(modes.indexOf(current) + 1) % modes.length];
      applyMode(next);
    }

    document.addEventListener("DOMContentLoaded", function () {
      const button = document.getElementById("theme-toggle");
      if (button) {
        button.addEventListener("click", function (event) {
          event.preventDefault();
          event.stopImmediatePropagation();
          cycleMode();
        }, true);
      }

      const media = window.matchMedia("(prefers-color-scheme: dark)");
      if (typeof media.addEventListener === "function") {
        media.addEventListener("change", function () {
          if (readMode() === "auto") {
            applyMode("auto");
          }
        });
      }

      syncToggle(readMode());
    });
  })();
</script>


<script>
    let menu = document.getElementById('menu');
    if (menu) {
        
        const scrollPosition = localStorage.getItem("menu-scroll-position");
        if (scrollPosition) {
            menu.scrollLeft = parseInt(scrollPosition, 10);
        }
        
        menu.onscroll = function () {
            localStorage.setItem("menu-scroll-position", menu.scrollLeft);
        }
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
<script>
    var toplink = document.getElementById("top-link");
    window.onscroll = function () {
        const scrollThreshold = window.innerHeight;
        if (document.body.scrollTop > scrollThreshold || document.documentElement.scrollTop > scrollThreshold) {
            toplink.classList.remove("hidden");
        } else {
            toplink.classList.add("hidden");
        }
    };

</script>
<script>
    document.getElementById("theme-toggle").addEventListener("click", () => {
        const html = document.querySelector("html");
        if (html.dataset.theme === "dark") {
            html.dataset.theme = 'light';
            localStorage.setItem("pref-theme", 'light');
        } else {
            html.dataset.theme = 'dark';
            localStorage.setItem("pref-theme", 'dark');
        }
    })

</script>
