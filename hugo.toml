baseURL = "https://zengeeklabs.github.io/"
title = "ZenGeekLabs"
theme = "DoIt-main"
defaultContentLanguage = "zh-cn"
defaultContentLanguageInSubdir = false
disableDefaultLanguageRedirect = true
enableRobotsTXT = true
enableEmoji = true
publishDir = "docs"

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]

[taxonomies]
  tag = "tags"
  category = "categories"

[permalinks]
  blog = "/blog/:slug/"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[params]
  version = "1.0.2"
  defaultTheme = "auto"
  fingerprint = ""
  dateFormat = "2006-01-02"
  images = ["/avatar-placeholder.svg"]
  description = "记录编程、工具、工作流、知识整理，以及那些值得长期复用的方法。"
  keywords = ["博客", "Hugo", "编程", "工具", "工作流", "知识整理"]
  mainSections = ["blog"]

  [params.author]
    name = "ZenGeekLabs"
    link = "https://zengeeklabs.github.io/"
    avatar = "/avatar-placeholder.svg"

  [params.app]
    title = "ZenGeekLabs"
    noFavicon = false
    svgFavicon = ""
    iconColor = "#2e2e33"
    tileColor = "#2e2e33"

  [params.search]
    enable = true
    type = "fuse"
    contentLength = 4000
    placeholder = "搜索文章..."
    maxResultLength = 10
    snippetLength = 50
    highlightTag = "em"
    absoluteURL = false
    [params.search.fuse]
      isCaseSensitive = false
      minMatchCharLength = 2
      findAllMatches = false
      location = 0
      threshold = 0.1
      distance = 100
      ignoreLocation = true
      useExtendedSearch = false
      ignoreFieldNorm = false

  [params.header]
    themeChangeMode = "switch"
    [params.header.title]
      logo = ""
      name = "ZenGeekLabs"
      pre = ""
      post = ""
      typeit = false

  [params.footer]
    enable = true
    custom = "内容优先，长期积累。"
    hugo = false
    hostedOn = ""
    copyright = false
    author = false
    since = 2026
    icp = ""
    license = ""

  [params.section]
    paginate = 10
    dateFormat = "01-02"
    rss = 10

  [params.list]
    paginate = 10
    dateFormat = "01-02"
    rss = 10

  [params.home]
    rss = 10
    [params.home.profile]
      enable = true
      gravatarEmail = ""
      avatarURL = "/avatar-placeholder.svg"
      avatarLinkURL = ""
      title = "ZenGeekLabs"
      subtitle = "把经验写下来，把思考留下来。这里记录编程、工具、工作流与那些值得长期复用的方法。"
      typeit = false
      social = true
      disclaimer = ""
    [params.home.posts]
      enable = true
      paginate = 10
      imagePreview = false

  [params.social]
    RSS = true
    [params.social.GitHub]
      url = "https://github.com/"
      title = "GitHub"
    [params.social.Bilibili]
      url = "https://www.bilibili.com/"
      title = "Bilibili"
    [params.social.Youtubecustom]
      url = "https://www.youtube.com/"
      title = "YouTube"

  [params.page]
    hiddenFromHomePage = false
    hiddenFromSearch = false
    twemoji = false
    lightgallery = false
    ruby = true
    fraction = true
    linkToMarkdown = false
    linkToSource = ""
    linkToEdit = ""
    linkToReport = ""
    rssFullText = false
    seriesNavigation = false
    enableLastMod = true
    enableWordCount = true
    enableReadingTime = true
    [params.page.toc]
      enable = true
      keepStatic = false
      auto = true
    [params.page.code]
      maxShownLines = 20
      lineNos = true
      wrap = false
      header = true
    [params.page.table]
      sort = true
    [params.page.share]
      enable = false

[languages]
  [languages.zh-cn]
    weight = 1
    locale = "zh-CN"
    label = "中文"
    hasCJKLanguage = true
    title = "ZenGeekLabs"
    copyright = ""

    [languages.zh-cn.params]
      description = "记录编程、工具、工作流、知识整理，以及那些值得长期复用的方法。"
      keywords = ["博客", "Hugo", "编程", "工具", "工作流", "知识整理"]
      [languages.zh-cn.params.search]
        placeholder = "搜索文章..."
      [languages.zh-cn.params.home.profile]
        title = "ZenGeekLabs"
        subtitle = "把经验写下来，把思考留下来。这里记录编程、工具、工作流与那些值得长期复用的方法。"
      [languages.zh-cn.params.footer]
        custom = "内容优先，长期积累。"

  [languages.en]
    weight = 2
    locale = "en-US"
    label = "English"
    hasCJKLanguage = false
    title = "ZenGeekLabs"
    copyright = ""

    [languages.en.params]
      description = "Notes on programming, tools, workflows, knowledge management, and methods worth keeping."
      keywords = ["blog", "Hugo", "programming", "tools", "workflow", "knowledge management"]
      [languages.en.params.search]
        placeholder = "Search posts..."
      [languages.en.params.home.profile]
        title = "ZenGeekLabs"
        subtitle = "Write the experience down and keep the thinking visible. This space is for programming, tools, workflows, and reusable methods."
      [languages.en.params.footer]
        custom = "Content first. Build for the long run."

