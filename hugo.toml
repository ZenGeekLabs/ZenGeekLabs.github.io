baseURL = "https://zengeeklabs.github.io/"
title = "ZenGeekLabs"
theme = "PaperMod"
defaultContentLanguage = "zh-cn"
defaultContentLanguageInSubdir = false
disableDefaultLanguageRedirect = true
enableRobotsTXT = true
pagination.pagerSize = 10
publishDir = "docs"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  author = "ZenGeekLabs"
  displayFullLangName = true
  keywords = ["博客", "Hugo", "编程", "工具", "工作流", "知识整理"]
  description = "记录编程、工具、工作流、知识整理，以及那些值得长期复用的方法。"
  DateFormat = "2006-01-02"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowToc = true
  TocOpen = false
  ShowAllPagesInArchive = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  mainSections = ["blog"]

  [params.footer]
    text = "内容优先，长期积累。"

  [params.assets]
    favicon = "/favicon.ico"
    apple_touch_icon = "/apple-touch-icon.png"

  [params.label]
    text = "ZenGeekLabs"
    icon = "/apple-touch-icon.png"
    iconHeight = 28

  [params.profileMode]
    enabled = true
    title = "ZenGeekLabs"
    subtitle = "把经验写下来，把思考留下来。这里记录编程、工具、工作流与那些值得长期复用的方法。"
    imageUrl = "/avatar-placeholder.svg"
    imageTitle = "ZenGeekLabs Avatar"
    imageWidth = 128
    imageHeight = 128

    [[params.profileMode.buttons]]
      name = "阅读"
      url = "/blog/"

    [[params.profileMode.buttons]]
      name = "归档"
      url = "/archives/"

    [[params.profileMode.buttons]]
      name = "标签"
      url = "/tags/"

    [[params.profileMode.buttons]]
      name = "搜索"
      url = "/search/"

    [[params.profileMode.buttons]]
      name = "关于"
      url = "/about/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/"

  [[params.socialIcons]]
    name = "bilibili"
    url = "https://www.bilibili.com/"

  [[params.socialIcons]]
    name = "youtube"
    url = "https://www.youtube.com/"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[languages]
  [languages.zh-cn]
    label = "中文"
    locale = "zh-CN"
    direction = "ltr"
    weight = 1
    title = "ZenGeekLabs"

    [languages.zh-cn.params]
      description = "记录编程、工具、工作流、知识整理，以及那些值得长期复用的方法。"

      [languages.zh-cn.params.profileMode]
        enabled = true
        title = "ZenGeekLabs"
        subtitle = "把经验写下来，把思考留下来。这里记录编程、工具、工作流与那些值得长期复用的方法。"
        imageUrl = "/avatar-placeholder.svg"
        imageTitle = "ZenGeekLabs Avatar"
        imageWidth = 128
        imageHeight = 128

        [[languages.zh-cn.params.profileMode.buttons]]
          name = "阅读"
          url = "/blog/"

        [[languages.zh-cn.params.profileMode.buttons]]
          name = "归档"
          url = "/archives/"

        [[languages.zh-cn.params.profileMode.buttons]]
          name = "标签"
          url = "/tags/"

        [[languages.zh-cn.params.profileMode.buttons]]
          name = "搜索"
          url = "/search/"

        [[languages.zh-cn.params.profileMode.buttons]]
          name = "关于"
          url = "/about/"

  [languages.en]
    label = "English"
    locale = "en-US"
    direction = "ltr"
    weight = 2
    title = "ZenGeekLabs"

    [languages.en.params]
      description = "Notes on programming, tools, workflows, knowledge management, and methods worth keeping."

      [languages.en.params.profileMode]
        enabled = true
        title = "ZenGeekLabs"
        subtitle = "Write the experience down and keep the thinking visible. This space is for programming, tools, workflows, and reusable methods."
        imageUrl = "/avatar-placeholder.svg"
        imageTitle = "ZenGeekLabs Avatar"
        imageWidth = 128
        imageHeight = 128

        [[languages.en.params.profileMode.buttons]]
          name = "Read"
          url = "/en/blog/"

        [[languages.en.params.profileMode.buttons]]
          name = "Archive"
          url = "/en/archives/"

        [[languages.en.params.profileMode.buttons]]
          name = "Tags"
          url = "/en/tags/"

        [[languages.en.params.profileMode.buttons]]
          name = "Search"
          url = "/en/search/"

        [[languages.en.params.profileMode.buttons]]
          name = "About"
          url = "/en/about/"

      [[languages.en.params.socialIcons]]
        name = "github"
        url = "https://github.com/"

      [[languages.en.params.socialIcons]]
        name = "bilibili"
        url = "https://www.bilibili.com/"

      [[languages.en.params.socialIcons]]
        name = "youtube"
        url = "https://www.youtube.com/"

      [[languages.en.params.socialIcons]]
        name = "rss"
        url = "/en/index.xml"

[taxonomies]
  tag = "tags"
  category = "categories"

[permalinks]
  blog = "/blog/:slug/"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

